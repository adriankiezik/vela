[package]
name = "vela"
version = "0.1.0"
edition = "2021"
description = "Vela — a clean-room Minecraft server (protocol 776 / MC 26.2) written in Rust"

[dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "time", "sync"] }
bytes = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = "1"
md-5 = "0.10"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.release]
opt-level = 3
lto = true
